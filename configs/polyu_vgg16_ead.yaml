# Experiment: PolyU dataset + VGG16 backbone + EAD Siamese head
# Replicates the original work (Stage 1: ~73% val acc, Stage 2: ~95% acc, EER ~4%)

experiment:
  name: polyu_vgg16_ead

dataset:
  name: polyu
  source_dir: contact-based_fingerprints/first_session
  num_subjects: 300

backbone:
  name: vgg16
  dense_units: 1024
  dropout: 0.5

training:
  stage1:
    phase_a:
      epochs: 50
      lr: 3.0e-4
    phase_b:
      epochs: 30
      lr: 5.0e-5
      unfreeze_layer: block5_conv3
  stage2:
    epochs: 50
    num_pairs: 6000

siamese_head:
  name: ead
  dense_1: 512
  dense_2: 256
  dropout: 0.3
